services:
  router:
    build:
      context: ./router
    hostname: router
    cap_add:
      - NET_ADMIN
    sysctls:
      net.ipv4.ip_forward: "1"
    networks:
      arm_net:
        ipv4_address: 172.21.0.254
        interface_name: eth0
      brain_net:
        ipv4_address: 172.20.0.254
        interface_name: eth1

  left_arm:
    build:
      context: ./node
    hostname: left_arm
    depends_on:
      - router
    cap_add:
      - NET_ADMIN
    environment:
      NODE_NAME: left_arm
      PEER_SUBNET: 172.20.0.0/24
      ROUTER_IP: 172.21.0.254
    dns:
      - 172.21.0.254
    expose:
      - "9000"
    volumes:
      - left_data:/data
    networks:
      arm_net:
        ipv4_address: 172.21.0.11
        interface_name: eth0

  right_arm:
    build:
      context: ./node
    hostname: right_arm
    depends_on:
      - router
    cap_add:
      - NET_ADMIN
    environment:
      NODE_NAME: right_arm
      PEER_SUBNET: 172.20.0.0/24
      ROUTER_IP: 172.21.0.254
    dns:
      - 172.21.0.254
    expose:
      - "9000"
    volumes:
      - right_data:/data
    networks:
      arm_net:
        ipv4_address: 172.21.0.12
        interface_name: eth0

  brain:
    build:
      context: ./node
    hostname: brain
    depends_on:
      - router
    cap_add:
      - NET_ADMIN
    environment:
      NODE_NAME: brain
      PEER_SUBNET: 172.21.0.0/24
      ROUTER_IP: 172.20.0.254
    dns:
      - 172.20.0.254
    expose:
      - "9000"
    volumes:
      - brain_data:/data
    networks:
      brain_net:
        ipv4_address: 172.20.0.11
        interface_name: eth0

networks:
  arm_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.0.0/24
          gateway: 172.21.0.1
  brain_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24
          gateway: 172.20.0.1

volumes:
  left_data:
  right_data:
  brain_data:

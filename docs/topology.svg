<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">Network Training Lab Topology</title>
  <desc id="desc">Topology diagram with left_arm and right_arm on 172.21.0.0/24, brain on 172.20.0.0/24, and a router providing DNS, routing, and firewall controls between the subnets.</desc>
  <defs>
    <style>
      .bg { fill: #f4f1e8; }
      .title { font: 700 30px sans-serif; fill: #1d2a33; }
      .subtitle { font: 400 17px sans-serif; fill: #41505a; }
      .zone-title { font: 700 24px sans-serif; fill: #1d2a33; }
      .label { font: 600 17px sans-serif; fill: #1d2a33; }
      .small { font: 400 15px sans-serif; fill: #41505a; }
      .tiny { font: 400 13px sans-serif; fill: #5b6b75; }
      .hostbox { fill: #ffffff; stroke: #22313a; stroke-width: 2; rx: 14; ry: 14; }
      .routerbox { fill: #fff8dc; stroke: #9b6b00; stroke-width: 3; rx: 18; ry: 18; }
      .subnet-left { fill: #d7efe6; stroke: #2d7a5f; stroke-width: 3; rx: 28; ry: 28; }
      .subnet-right { fill: #dbe8f6; stroke: #2a5f94; stroke-width: 3; rx: 28; ry: 28; }
      .callout { fill: #fff; stroke: #7b8b96; stroke-width: 2; rx: 12; ry: 12; }
      .allowed { stroke: #14804a; stroke-width: 4; fill: none; marker-end: url(#arrow-green); }
      .blocked { stroke: #b42318; stroke-width: 4; stroke-dasharray: 10 8; fill: none; marker-end: url(#arrow-red); }
      .link { stroke: #475867; stroke-width: 4; fill: none; marker-end: url(#arrow-dark); }
      .softlink { stroke: #6c7a84; stroke-width: 3; fill: none; marker-end: url(#arrow-dark); }
    </style>
    <marker id="arrow-dark" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#475867"/>
    </marker>
    <marker id="arrow-green" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#14804a"/>
    </marker>
    <marker id="arrow-red" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#b42318"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1280" height="760"/>

  <text class="title" x="50" y="58">Network Training Lab</text>
  <text class="subtitle" x="50" y="88">Docker Compose topology with interfaces, routes, gateway, DNS, and firewall behavior</text>

  <rect class="subnet-left" x="40" y="130" width="520" height="520"/>
  <text class="zone-title" x="70" y="175">arm_net</text>
  <text class="subtitle" x="70" y="205">172.21.0.0/24</text>

  <rect class="subnet-right" x="720" y="130" width="520" height="520"/>
  <text class="zone-title" x="750" y="175">brain_net</text>
  <text class="subtitle" x="750" y="205">172.20.0.0/24</text>

  <rect class="hostbox" x="90" y="250" width="180" height="130"/>
  <text class="label" x="125" y="290">left_arm</text>
  <text class="small" x="125" y="322">eth0: 172.21.0.11</text>
  <text class="small" x="125" y="348">TCP echo: 9000</text>
  <text class="small" x="125" y="374">logs: /data/states.log</text>

  <rect class="hostbox" x="90" y="430" width="180" height="130"/>
  <text class="label" x="120" y="470">right_arm</text>
  <text class="small" x="125" y="502">eth0: 172.21.0.12</text>
  <text class="small" x="125" y="528">TCP echo: 9000</text>
  <text class="small" x="125" y="554">logs: /data/states.log</text>

  <rect class="hostbox" x="870" y="340" width="200" height="150"/>
  <text class="label" x="940" y="382">brain</text>
  <text class="small" x="905" y="416">eth0: 172.20.0.11</text>
  <text class="small" x="905" y="442">TCP echo: 9000</text>
  <text class="small" x="905" y="468">logs: /data/states.log</text>

  <rect class="routerbox" x="490" y="270" width="300" height="220"/>
  <text class="label" x="600" y="310">router</text>
  <text class="small" x="530" y="345">eth0: 172.21.0.254</text>
  <text class="small" x="530" y="372">eth1: 172.20.0.254</text>
  <text class="small" x="530" y="399">dnsmasq: lab DNS</text>
  <text class="small" x="530" y="426">IPv4 forwarding enabled</text>
  <text class="small" x="530" y="453">iptables FORWARD policy: DROP</text>

  <path class="link" d="M270 315 C360 315, 405 315, 490 315"/>
  <path class="link" d="M270 495 C360 495, 405 495, 490 445"/>
  <path class="link" d="M790 380 C835 380, 845 380, 870 380"/>

  <text class="tiny" x="305" y="298">same subnet</text>
  <text class="tiny" x="308" y="478">same subnet</text>
  <text class="tiny" x="804" y="362">same subnet</text>

  <path class="softlink" d="M270 340 C395 340, 445 340, 505 340"/>
  <text class="tiny" x="302" y="335">DNS server: 172.21.0.254</text>

  <path class="softlink" d="M1070 420 C1120 420, 1120 300, 790 300"/>
  <text class="tiny" x="940" y="292">DNS server: 172.20.0.254</text>

  <path class="allowed" d="M270 280 C420 210, 610 210, 870 340"/>
  <text class="label" x="430" y="175" fill="#14804a">Allowed: cross-subnet TCP/9000</text>
  <text class="small" x="430" y="198" fill="#14804a">left_arm / right_arm / brain can echo over TCP</text>

  <path class="blocked" d="M270 540 C450 640, 640 640, 870 500"/>
  <text class="label" x="420" y="670" fill="#b42318">Blocked: cross-subnet ICMP</text>
  <text class="small" x="420" y="693" fill="#b42318">Example: ping left_arm -&gt; brain fails at router firewall</text>

  <rect class="callout" x="70" y="590" width="365" height="88"/>
  <text class="label" x="92" y="622">Static route on left_arm and right_arm</text>
  <text class="small" x="92" y="650">172.20.0.0/24 via 172.21.0.254</text>

  <rect class="callout" x="845" y="540" width="330" height="88"/>
  <text class="label" x="867" y="572">Static route on brain</text>
  <text class="small" x="867" y="600">172.21.0.0/24 via 172.20.0.254</text>

  <rect class="callout" x="475" y="535" width="330" height="120"/>
  <text class="label" x="497" y="568">Logging behavior on every node</text>
  <text class="small" x="497" y="596">Writes one line per second in UTC</text>
  <text class="small" x="497" y="622">Keeps only the last 60 seconds in /data/states.log</text>

  <text class="tiny" x="50" y="730">Note: Docker bridge gateway .1 still exists on each subnet. The router container is the teaching gateway for inter-subnet traffic via explicit static routes.</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">Network Training Lab Speaker Topology</title>
  <desc id="desc">Presenter-friendly topology with numbered callouts for interface, route, gateway, DNS, and firewall topics.</desc>
  <defs>
    <style>
      .bg { fill: #f6f3ea; }
      .title { font: 700 40px sans-serif; fill: #17232c; }
      .subtitle { font: 400 22px sans-serif; fill: #46565f; }
      .zone { stroke-width: 4; rx: 30; ry: 30; }
      .zone-left { fill: #d9efe6; stroke: #2f7c61; }
      .zone-right { fill: #dce7f7; stroke: #2f6198; }
      .host { fill: #ffffff; stroke: #24323b; stroke-width: 3; rx: 18; ry: 18; }
      .router { fill: #fff4ca; stroke: #8f6500; stroke-width: 4; rx: 22; ry: 22; }
      .box-title { font: 700 28px sans-serif; fill: #17232c; }
      .box-line { font: 500 20px sans-serif; fill: #33424c; }
      .zone-title { font: 700 30px sans-serif; fill: #17232c; }
      .zone-line { font: 500 22px sans-serif; fill: #33424c; }
      .link { stroke: #52636f; stroke-width: 5; fill: none; marker-end: url(#arrow-dark); }
      .allowed { stroke: #117a43; stroke-width: 6; fill: none; marker-end: url(#arrow-green); }
      .blocked { stroke: #b42318; stroke-width: 6; stroke-dasharray: 14 10; fill: none; marker-end: url(#arrow-red); }
      .callout-box { fill: #fffdf8; stroke: #697983; stroke-width: 3; rx: 18; ry: 18; }
      .callout-title { font: 700 24px sans-serif; fill: #17232c; }
      .callout-text { font: 500 18px sans-serif; fill: #33424c; }
      .badge { fill: #17232c; }
      .badge-text { font: 700 20px sans-serif; fill: #ffffff; text-anchor: middle; dominant-baseline: middle; }
    </style>
    <marker id="arrow-dark" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M 0 0 L 14 7 L 0 14 z" fill="#52636f"/>
    </marker>
    <marker id="arrow-green" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M 0 0 L 14 7 L 0 14 z" fill="#117a43"/>
    </marker>
    <marker id="arrow-red" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M 0 0 L 14 7 L 0 14 z" fill="#b42318"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1600" height="980"/>

  <text class="title" x="70" y="70">Network Training Lab Topology</text>
  <text class="subtitle" x="70" y="108">Presenter view with ordered callouts: interface, route, gateway, DNS, and firewall</text>

  <rect class="zone zone-left" x="60" y="160" width="600" height="520"/>
  <text class="zone-title" x="95" y="212">arm_net</text>
  <text class="zone-line" x="95" y="244">172.21.0.0/24</text>

  <rect class="zone zone-right" x="940" y="160" width="600" height="520"/>
  <text class="zone-title" x="975" y="212">brain_net</text>
  <text class="zone-line" x="975" y="244">172.20.0.0/24</text>

  <rect class="host" x="120" y="300" width="230" height="140"/>
  <text class="box-title" x="178" y="350">left_arm</text>
  <text class="box-line" x="148" y="388">eth0: 172.21.0.11</text>
  <text class="box-line" x="170" y="420">TCP/9000</text>

  <rect class="host" x="120" y="490" width="230" height="140"/>
  <text class="box-title" x="164" y="540">right_arm</text>
  <text class="box-line" x="148" y="578">eth0: 172.21.0.12</text>
  <text class="box-line" x="170" y="610">TCP/9000</text>

  <rect class="router" x="630" y="315" width="340" height="210"/>
  <text class="box-title" x="762" y="365">router</text>
  <text class="box-line" x="680" y="406">eth0: 172.21.0.254</text>
  <text class="box-line" x="680" y="438">eth1: 172.20.0.254</text>
  <text class="box-line" x="700" y="470">DNS + routing + firewall</text>

  <rect class="host" x="1110" y="360" width="230" height="140"/>
  <text class="box-title" x="1192" y="410">brain</text>
  <text class="box-line" x="1138" y="448">eth0: 172.20.0.11</text>
  <text class="box-line" x="1160" y="480">TCP/9000</text>

  <path class="link" d="M350 370 C470 370, 545 370, 630 402"/>
  <path class="link" d="M350 560 C480 560, 550 545, 630 458"/>
  <path class="link" d="M970 420 C1035 420, 1075 420, 1110 430"/>

  <path class="allowed" d="M350 320 C560 205, 845 205, 1110 360"/>
  <path class="blocked" d="M350 620 C600 760, 865 760, 1110 500"/>

  <rect class="callout-box" x="60" y="740" width="275" height="165"/>
  <circle class="badge" cx="98" cy="780" r="22"/>
  <text class="badge-text" x="98" y="782">1</text>
  <text class="callout-title" x="132" y="787">Interface</text>
  <text class="callout-text" x="88" y="828">Start with `ip addr`.</text>
  <text class="callout-text" x="88" y="855">Each node has `eth0`.</text>
  <text class="callout-text" x="88" y="882">Router has `eth0` and `eth1`.</text>

  <rect class="callout-box" x="365" y="740" width="285" height="165"/>
  <circle class="badge" cx="403" cy="780" r="22"/>
  <text class="badge-text" x="403" y="782">2</text>
  <text class="callout-title" x="437" y="787">Route</text>
  <text class="callout-text" x="393" y="828">Use `ip route`.</text>
  <text class="callout-text" x="393" y="855">arms: `172.20.0.0/24 via .254`</text>
  <text class="callout-text" x="393" y="882">brain: `172.21.0.0/24 via .254`</text>

  <rect class="callout-box" x="680" y="740" width="285" height="165"/>
  <circle class="badge" cx="718" cy="780" r="22"/>
  <text class="badge-text" x="718" y="782">3</text>
  <text class="callout-title" x="752" y="787">Gateway</text>
  <text class="callout-text" x="708" y="828">Traffic between subnets</text>
  <text class="callout-text" x="708" y="855">must traverse the router.</text>
  <text class="callout-text" x="708" y="882">Router forwards IPv4 packets.</text>

  <rect class="callout-box" x="995" y="740" width="245" height="165"/>
  <circle class="badge" cx="1033" cy="780" r="22"/>
  <text class="badge-text" x="1033" y="782">4</text>
  <text class="callout-title" x="1067" y="787">DNS</text>
  <text class="callout-text" x="1023" y="828">Router runs `dnsmasq`.</text>
  <text class="callout-text" x="1023" y="855">`brain`, `left_arm`, and</text>
  <text class="callout-text" x="1023" y="882">`right_arm` resolve by name.</text>

  <rect class="callout-box" x="1270" y="740" width="270" height="165"/>
  <circle class="badge" cx="1308" cy="780" r="22"/>
  <text class="badge-text" x="1308" y="782">5</text>
  <text class="callout-title" x="1342" y="787">Firewall</text>
  <text class="callout-text" x="1298" y="828">Only cross-subnet TCP/9000</text>
  <text class="callout-text" x="1298" y="855">is allowed.</text>
  <text class="callout-text" x="1298" y="882">Cross-subnet ICMP is dropped.</text>

  <circle class="badge" cx="245" cy="272" r="22"/>
  <text class="badge-text" x="245" y="274">1</text>
  <circle class="badge" cx="260" cy="700" r="22"/>
  <text class="badge-text" x="260" y="702">2</text>
  <circle class="badge" cx="800" cy="285" r="22"/>
  <text class="badge-text" x="800" y="287">3</text>
  <circle class="badge" cx="905" cy="315" r="22"/>
  <text class="badge-text" x="905" y="317">4</text>
  <circle class="badge" cx="760" cy="625" r="22"/>
  <text class="badge-text" x="760" y="627">5</text>

  <text class="callout-title" x="570" y="170" fill="#117a43">Allowed</text>
  <text class="callout-text" x="570" y="200" fill="#117a43">Cross-subnet TCP/9000</text>
  <text class="callout-title" x="570" y="806" fill="#b42318">Blocked</text>
  <text class="callout-text" x="570" y="836" fill="#b42318">Cross-subnet ICMP</text>

  <text class="callout-text" x="620" y="560">Each node writes hostname + UTC timestamp every second.</text>
  <text class="callout-text" x="670" y="590">Only the last 60 seconds remain in `/data/states.log`.</text>

  <text class="callout-text" x="70" y="950">Note: Docker bridge gateway `.1` still exists on each subnet. The router container is the teaching gateway because the lab installs explicit routes to `.254` for inter-subnet traffic.</text>
</svg>
